# Dynamic Yield Optimization Agent – one-command setup
# Usage: docker compose -f deploy/docker-compose.yml up --build

services:
  redis:
    image: redis:7-alpine
    container_name: yield-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: yield-agent-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/yield-agent-dev}
      # Enable APOC plugin
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
    ports:
      - "7475:7474"   # Browser on host 7475 (default 7474 often in use)
      - "7688:7687"   # Bolt on host 7688 (default 7687 often in use)
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway-wdk:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gateway
    container_name: yield-agent-gateway
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      AI_CORE_GRPC_URL: ai-core:50051
      AI_CORE_HTTP_URL: http://ai-core:8000
      TRANSACT_API_URL: http://ai-core:8000
      NEO4J_URI: bolt://neo4j:7687
      REDIS_URL: redis://redis:6379
      RPC_URL_ETHEREUM: ${RPC_URL_ETHEREUM:-https://eth.llamarpc.com}
      RPC_URL_SEPOLIA: ${RPC_URL_SEPOLIA:-https://rpc.sepolia.org}
      WDK_NETWORKS: ${WDK_NETWORKS:-}
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  ai-core:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.ai-core-unified
    container_name: yield-agent-ai-core
    ports:
      - "50051:50051"
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-yield-agent-dev}
      REDIS_URL: redis://redis:6379
      GATEWAY_URL: http://gateway-wdk:3000
      # Unified container: TRANSACT HTTP on 8000; ai-core gRPC calls it on localhost
      TRANSACT_API_URL: http://127.0.0.1:8000
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import grpc; print('ok')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  yield-agent-mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.mcp-server
    container_name: yield-agent-mcp
    ports:
      - "3001:3001"
    environment:
      GATEWAY_URL: http://gateway-wdk:3000
      # TRANSACT is the unified ai-core HTTP (port 8000)
      TRANSACT_API_URL: http://ai-core:8000
      PORT: 3001
    depends_on:
      gateway-wdk:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # LangGraph Orchestrator — replaces OpenClaw for agentic trading
  # Uses LangGraph state machine + GraphRAG + Deep RL for trade decisions
  orchestrator:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.ai-core-unified
    container_name: yield-agent-orchestrator
    ports:
      - "8001:8001"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-yield-agent-dev}
      REDIS_URL: redis://redis:6379
      KRAKEN_GATEWAY_URL: http://gateway-wdk:3000/api/kraken
      ORCHESTRATOR_PORT: "8001"
    command: ["python", "-m", "ai_core.orchestrator.server"]
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      gateway-wdk:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      args:
        VITE_GATEWAY_URL: http://localhost:3000
        VITE_WS_URL: ws://localhost:3000
        VITE_API_URL: http://localhost:3000/api/transact
    container_name: yield-agent-frontend
    ports:
      - "5173:80"
    depends_on:
      - gateway-wdk

  graph-seeder:
    image: neo4j:5-community
    container_name: yield-agent-graph-seeder
    entrypoint: ["/bin/bash", "/scripts/seed_graph.sh"]
    volumes:
      - ../ai-core/scripts:/scripts:ro
      - ../ai-core/cypher:/cypher:ro
      - ../psychic-invention/knowledge_base/import:/psychic-import:ro
    environment:
      NEO4J_BOLT_URL: bolt://neo4j:7687
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/yield-agent-dev}
    depends_on:
      neo4j:
        condition: service_healthy
    restart: "no"

  indexer:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.indexer
    container_name: yield-agent-indexer
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-yield-agent-dev}
      REDIS_URL: redis://redis:6379
      RPC_URL_ETHEREUM: ${RPC_URL_ETHEREUM:-https://eth.llamarpc.com}
      RPC_URL_SEPOLIA: ${RPC_URL_SEPOLIA:-https://rpc.sepolia.org}
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: "on-failure"

volumes:
  neo4j_data:
  redis_data:
